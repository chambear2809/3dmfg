# FilaOps Dependabot Configuration
# Keeps Python (backend) and Node (frontend) dependencies current
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python backend (FastAPI)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(py):"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10

  # React frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(js):"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(ci):"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
