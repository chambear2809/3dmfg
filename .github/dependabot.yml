# FilaOps Dependabot Configuration
# Keeps Python (backend), Node (frontend), and GitHub Actions dependencies current
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python backend (FastAPI)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(py):"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    groups:
      pip-security:
        applies-to: security-updates
      pip-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # React frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(js):"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 10
    groups:
      npm-security:
        applies-to: security-updates
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(ci):"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 10
