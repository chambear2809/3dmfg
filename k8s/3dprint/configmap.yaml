apiVersion: v1
kind: ConfigMap
metadata:
  name: filaops-config
  namespace: 3dprint
data:
  ENVIRONMENT: 3dprint
  DB_HOST: db
  DB_PORT: "5432"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "10"
  NOTIFICATION_SERVICE_URL: http://notification-service
  NOTIFICATION_SERVICE_TIMEOUT_SECONDS: "5"
  ASSET_SERVICE_URL: http://asset-service
  ASSET_SERVICE_TIMEOUT_SECONDS: "10"
  ORDER_INGEST_SERVICE_URL: http://order-ingest
  ORDER_INGEST_SERVICE_TIMEOUT_SECONDS: "10"
  ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://ac102dfc2582e488693dcc5e22252a6f-1954348155.us-east-1.elb.amazonaws.com
  FRONTEND_URL: http://ac102dfc2582e488693dcc5e22252a6f-1954348155.us-east-1.elb.amazonaws.com
  FILAOPS_VERSION: "3.6.0"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  LOG_FILE: ""
  AUDIT_LOG_FILE: ""
  COOKIE_SECURE: "false"
  AUTH_MODE: cookie
  OTEL_SERVICE_NAME: filaops-backend
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=3dprint,deployment.environment.name=3dprint,service.version=3.6.0
  OTEL_PROPAGATORS: tracecontext,baggage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filaops-frontend-config
  namespace: 3dprint
data:
  FRONTEND_PORT: "8080"
  VITE_API_URL: ""
  FRONTEND_API_UPSTREAM: http://backend
  FRONTEND_STATIC_UPSTREAM: http://backend
  FRONTEND_PORTAL_UPSTREAM: http://backend
  FRONTEND_OTLP_TRACES_UPSTREAM: http://splunk-otel-collector-agent.otel-splunk.svc:4318/v1/traces
  SPLUNK_RUM_ENABLED: "true"
  SPLUNK_RUM_REALM: us1
  SPLUNK_RUM_APP_NAME: filaops-frontend
  SPLUNK_RUM_DEBUG: "false"
  SPLUNK_RUM_EXPORTER: otlp
  SPLUNK_RUM_BEACON_ENDPOINT: /otel/v1/traces
  SPLUNK_RUM_SESSION_SAMPLE_RATIO: "1"
  SPLUNK_RUM_USER_TRACKING_MODE: noTracking
  SPLUNK_RUM_SESSION_REPLAY_ENABLED: "true"
  SPLUNK_RUM_MASK_ALL_TEXT: "false"
  SPLUNK_RUM_MASK_ALL_INPUTS: "true"
  OTEL_SERVICE_NAME: filaops-frontend
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=3dprint,deployment.environment.name=3dprint,service.version=3.6.0
  OTEL_LOGS_EXPORTER: none
  OTEL_METRICS_EXPORTER: none
  APP_ENV: 3dprint
  APP_VERSION: "3.6.0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: 3dprint
data:
  ENVIRONMENT: 3dprint
  LOG_LEVEL: INFO
  SMTP_FROM_EMAIL: noreply@example.com
  SMTP_FROM_NAME: FilaOps Notifications
  DEFAULT_WEBHOOK_TIMEOUT_SECONDS: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: asset-service-config
  namespace: 3dprint
data:
  ENVIRONMENT: 3dprint
  LOG_LEVEL: INFO
  ASSET_STORAGE_DIR: /data
  NOTIFICATION_SERVICE_URL: http://notification-service
  NOTIFICATION_SERVICE_TIMEOUT_SECONDS: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-ingest-config
  namespace: 3dprint
data:
  ENVIRONMENT: 3dprint
  LOG_LEVEL: INFO
  PRICING_SERVICE_URL: http://pricing-service
  PRICING_SERVICE_TIMEOUT_SECONDS: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pricing-service-config
  namespace: 3dprint
data:
  ENVIRONMENT: 3dprint
  LOG_LEVEL: INFO
