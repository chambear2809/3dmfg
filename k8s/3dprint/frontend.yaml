apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: 3dprint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        instrumentation.opentelemetry.io/container-names: frontend
        instrumentation.opentelemetry.io/inject-nodejs: 3dprint/filaops-nodejs
    spec:
      containers:
        - name: frontend
          image: 637423309390.dkr.ecr.us-east-1.amazonaws.com/filaops-frontend:demo-20260407-frontend-service-node-portfix-6e83328
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: filaops-frontend-config
          env:
            - name: SPLUNK_RUM_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filaops-secrets
                  key: SPLUNK_RUM_ACCESS_TOKEN
                  optional: true
            - name: OTEL_SERVICE_NAME
              value: filaops-frontend
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=3dprint,deployment.environment.name=3dprint,service.version=3.6.0
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: 3dprint
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
