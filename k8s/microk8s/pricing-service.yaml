apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  namespace: 3dprint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      containers:
        - name: pricing-service
          image: filaops-pricing-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8040
              name: http
          envFrom:
            - configMapRef:
                name: pricing-service-config
            - secretRef:
                name: filaops-secrets
          env:
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filaops-secrets
                  key: PRICING_SERVICE_TOKEN
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
  namespace: 3dprint
spec:
  selector:
    app: pricing-service
  ports:
    - name: http
      port: 80
      targetPort: http
