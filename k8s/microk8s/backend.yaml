apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads
  namespace: 3dprint
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: 3dprint
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: filaops-backend:local
          imagePullPolicy: Never
          args:
            - bash
            - scripts/docker-migrate.sh
          envFrom:
            - configMapRef:
                name: filaops-config
            - secretRef:
                name: filaops-secrets
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      containers:
        - name: backend
          image: filaops-backend:local
          imagePullPolicy: Never
          args:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "1"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: filaops-config
            - secretRef:
                name: filaops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: 3dprint
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: http
