apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asset-service-data
  namespace: 3dprint
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  namespace: 3dprint
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: asset-service
  template:
    metadata:
      labels:
        app: asset-service
    spec:
      containers:
        - name: asset-service
          image: filaops-asset-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8020
              name: http
          envFrom:
            - configMapRef:
                name: asset-service-config
            - secretRef:
                name: filaops-secrets
          env:
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filaops-secrets
                  key: ASSET_SERVICE_TOKEN
            - name: NOTIFICATION_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filaops-secrets
                  key: NOTIFICATION_SERVICE_TOKEN
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: asset-service-data
              mountPath: /data
      volumes:
        - name: asset-service-data
          persistentVolumeClaim:
            claimName: asset-service-data
---
apiVersion: v1
kind: Service
metadata:
  name: asset-service
  namespace: 3dprint
spec:
  selector:
    app: asset-service
  ports:
    - name: http
      port: 80
      targetPort: http
