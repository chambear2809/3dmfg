# ============================================================================
# Code Conclave Configuration - FilaOps
# ============================================================================
# Generated: 2026-02-04
# Updated: 2026-02-04 (tiered standards)
# ============================================================================

project:
  name: "filaops"
  version: "1.0.0"
  description: "Open-source 3D Print Farm ERP with regulatory compliance"
  industry: "manufacturing"
  
  regulatory_context:
    - "Medical device components (future)"
    - "Defense contractor customers"
    - "ITAR-controlled projects possible"

# ============================================================================
# COMPLIANCE STANDARDS
# ============================================================================

standards:
  # REQUIRED: Always applied (organizational mandate)
  required:
    - iso-9001-2015          # Base QMS - all projects
    
  # DEFAULT: Applied unless explicitly skipped
  default:
    - fda-21-cfr-11          # E-records (DHR/DMR traceability)
    - cmmc-l2                # Cybersecurity baseline
    
  # AVAILABLE: Can be added at PR time or via CLI
  available:
    - itar                   # Export control (defense projects)
    - as9100-rev-d           # Aerospace customers
    - iso-13485-2016         # Medical device QMS
    - iso-14971-2019         # Risk management
    - fda-820-qsr            # FDA Quality System Regulation
    
  # Pre-defined profiles
  profiles:
    defense:
      description: "Defense contract work"
      standards: [cmmc-l2, itar, as9100-rev-d]
      
    medical:
      description: "Medical device production"
      standards: [fda-21-cfr-11, iso-13485-2016, iso-14971-2019, fda-820-qsr]
      
    internal:
      description: "Internal tools (minimal compliance)"
      standards: []

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================

agents:
  timeout: 45              # Minutes per agent
  
  sentinel:
    coverage_target: 80
    complexity_threshold: 15
    
  guardian:
    scan_dependencies: true
    check_secrets: true
    
  architect:
    max_file_size: 500
    check_circular_deps: true
    
  navigator:
    accessibility_level: "AA"
    
  herald:
    required_docs:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/API.md"
      
  operator:
    require_health_check: true
    require_logging: true

# ============================================================================
# OUTPUT
# ============================================================================

output:
  format: "markdown"
  include_evidence: true
  include_remediation: true

# ============================================================================
# CI/CD
# ============================================================================

ci:
  exit_codes:
    ship: 0
    conditional: 2
    hold: 1
    
  branches:
    main:
      fail_on: "high"
    develop:
      fail_on: "blocker"
