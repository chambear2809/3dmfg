version: '3.8'

services:
  db:
    image: postgres:16
    container_name: filaops-db
    environment:
      POSTGRES_DB: ${DB_NAME:-filaops}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - filaops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - filaops-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filaops-migrate
    command: ["bash", "scripts/docker-migrate.sh"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-filaops}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      # PRO — set FILAOPS_LICENSE_KEY in .env to activate PRO features
      FILAOPS_LICENSE_KEY: ${FILAOPS_LICENSE_KEY:-}
      DATABASE_URL: postgresql+psycopg://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-filaops}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - filaops-network

  asset-service:
    build:
      context: ./asset-service
      dockerfile: Dockerfile
    container_name: filaops-asset-service
    ports:
      - "8020:8020"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      INTERNAL_API_TOKEN: ${ASSET_SERVICE_TOKEN:-change-me-asset-token}
      ASSET_STORAGE_DIR: /app/data
    volumes:
      - ./uploads/assets:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - filaops-network

  order-ingest:
    build:
      context: ./order-ingest
      dockerfile: Dockerfile
    container_name: filaops-order-ingest
    ports:
      - "8030:8030"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      INTERNAL_API_TOKEN: ${ORDER_INGEST_SERVICE_TOKEN:-change-me-order-ingest-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - filaops-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filaops-backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-filaops}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      FILAOPS_VERSION: ${FILAOPS_VERSION:-}
      # PRO — set FILAOPS_LICENSE_KEY in .env to activate PRO features
      FILAOPS_LICENSE_KEY: ${FILAOPS_LICENSE_KEY:-}
      ASSET_SERVICE_URL: ${ASSET_SERVICE_URL:-http://asset-service:8020}
      ASSET_SERVICE_TOKEN: ${ASSET_SERVICE_TOKEN:-change-me-asset-token}
      ORDER_INGEST_SERVICE_URL: ${ORDER_INGEST_SERVICE_URL:-http://order-ingest:8030}
      ORDER_INGEST_SERVICE_TOKEN: ${ORDER_INGEST_SERVICE_TOKEN:-change-me-order-ingest-token}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      asset-service:
        condition: service_healthy
      order-ingest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./uploads:/app/uploads
    networks:
      - filaops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: filaops-frontend
    ports:
      - "80:8080"
    environment:
      FRONTEND_API_UPSTREAM: ${FRONTEND_API_UPSTREAM:-http://backend:8000}
    depends_on:
      - backend
    networks:
      - filaops-network

volumes:
  filaops_pgdata:
    name: filaops_pgdata

networks:
  filaops-network:
    name: filaops-network
